name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/ZaikoXAU-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaikoXAU-APK
          path: out/ZaikoXAU-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ZaikoXAU v1.0.${{ github.run_number }}
          body: Auto-built APK from commit ${{ github.sha }}.
          files: out/ZaikoXAU-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
